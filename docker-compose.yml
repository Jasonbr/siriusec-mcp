# Siriusec_MCP Docker Compose 配置
# 用于本地开发和测试部署

version: '3.8'

services:
  # MCP 服务器 - streamable-http 模式
  siriusec-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: siriusec-mcp:latest
    container_name: siriusec-mcp-http
    restart: unless-stopped
    ports:
      - "7140:7140"
    environment:
      # 部署模式
      - DEPLOY_MODE=alibabacloud_sdk
      # OpenAPI 配置
      - OPENAPI_TYPE=access_key
      - OPENAPI_ACCESS_KEY_ID=${ACCESS_KEY_ID}
      - OPENAPI_ACCESS_KEY_SECRET=${ACCESS_KEY_SECRET}
      - OPENAPI_SECURITY_TOKEN=${SECURITY_TOKEN:-}
      - OPENAPI_ROLE_ARN=${ROLE_ARN:-}
      - REGION_ID=${REGION_ID:-cn-hangzhou}
      # LLM 配置
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command:
      - "run"
      - "--streamable-http"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "7140"
      - "--path"
      - "/mcp/unified"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7140/health", "||", "exit", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - siriusec-mcp-network

  # MCP 服务器 - SSE 模式
  siriusec-mcp-sse:
    build:
      context: .
      dockerfile: Dockerfile
    image: siriusec-mcp:latest
    container_name: siriusec-mcp-sse
    restart: unless-stopped
    ports:
      - "7141:7141"
    environment:
      - DEPLOY_MODE=alibabacloud_sdk
      - OPENAPI_TYPE=access_key
      - OPENAPI_ACCESS_KEY_ID=${ACCESS_KEY_ID}
      - OPENAPI_ACCESS_KEY_SECRET=${ACCESS_KEY_SECRET}
      - OPENAPI_SECURITY_TOKEN=${SECURITY_TOKEN:-}
      - OPENAPI_ROLE_ARN=${ROLE_ARN:-}
      - REGION_ID=${REGION_ID:-cn-hangzhou}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command:
      - "run"
      - "--sse"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "7141"
      - "--path"
      - "/mcp/unified"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7141/health", "||", "exit", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - siriusec-mcp-network
    profiles:
      - sse

networks:
  siriusec-mcp-network:
    driver: bridge
