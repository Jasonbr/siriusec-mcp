# Siriusec MCP 配置文件示例
# 复制此文件为 config.toml 并根据需要修改

[global]
# 全局设置
region = "cn-hangzhou"
log_level = "INFO"  # DEBUG, INFO, WARN, ERROR

[openapi]
# 阿里云 OpenAPI 配置
# 建议使用环境变量: ${ACCESS_KEY_ID}
type = "access_key"
access_key_id = "${ACCESS_KEY_ID}"
access_key_secret = "${ACCESS_KEY_SECRET}"
security_token = ""
role_arn = ""

[llm]
# 可选: LLM 配置
dashscope_api_key = "${DASHSCOPE_API_KEY}"

[server]
# HTTP 服务器配置
host = "0.0.0.0"
port = 7140
path = "/mcp/unified"
mode = "streamable-http"  # stdio, sse, streamable-http

# 工具配置示例
# [[tools]]
# name = "memgraph"
# enabled = true
# timeout = "60s"
#
# [[tools]]
# name = "javamem"
# enabled = false
