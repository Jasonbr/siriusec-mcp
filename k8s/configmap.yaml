# Siriusec_MCP ConfigMap
# 非敏感配置数据
apiVersion: v1
kind: ConfigMap
metadata:
  name: siriusec-mcp-config
  namespace: siriusec-mcp
  labels:
    app: siriusec-mcp
data:
  # 部署模式
  DEPLOY_MODE: "alibabacloud_sdk"
  # OpenAPI 配置
  OPENAPI_TYPE: "access_key"
  REGION_ID: "cn-hangzhou"
  # 日志配置
  LOG_LEVEL: "INFO"
  # 服务器配置
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "7140"
  MCP_PATH: "/mcp/unified"
  MCP_MODE: "streamable-http"
