# Siriusec_MCP Kustomization
# 用于管理所有 K8s 资源配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 命名空间
namespace: siriusec-mcp

# 资源列表
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml

# 通用标签
commonLabels:
  app: siriusec-mcp
  managed-by: kustomize

# 镜像配置（可通过 kustomize 覆盖）
images:
  - name: siriusec-mcp
    newTag: latest

# 配置映射（可通过 kustomize 覆盖）
configMapGenerator:
  - name: siriusec-mcp-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
