# Siriusec_MCP Secret
# 敏感配置数据（请使用 base64 编码）
# 使用命令: echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: siriusec-mcp-secret
  namespace: siriusec-mcp
  labels:
    app: siriusec-mcp
type: Opaque
data:
  # 阿里云 Access Key ID (base64 编码)
  ACCESS_KEY_ID: ""
  # 阿里云 Access Key Secret (base64 编码)
  ACCESS_KEY_SECRET: ""
  # 安全令牌（可选，base64 编码）
  SECURITY_TOKEN: ""
  # 角色 ARN（可选，base64 编码）
  ROLE_ARN: ""
  # 灵积模型服务 API Key (base64 编码)
  DASHSCOPE_API_KEY: ""
